plugins {
    id 'application'
    id 'org.beryx.jlink' version '4.0.1-rc'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(26)
    }
}

application {
    mainClass = 'org.example.App'
    applicationDefaultJvmArgs = [
            '-Dapplication.default.jvm.args'
    ]
}

jlink {
    launcher {
        name = 'example'
        jvmArgs = [
                '-Djlink.launcher.jvm.args'
        ]
    }
}

jpackage {
    if (org.gradle.internal.os.OperatingSystem.current().linux) {
        installerType = 'deb'
    }
    if (org.gradle.internal.os.OperatingSystem.current().windows) {
        installerType = 'msi'
    }
}